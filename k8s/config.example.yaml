apiVersion: v1
kind: ConfigMap
metadata:
  name: chefmate-config
data:
  PORT: "8000"
  API_PREFIX: "/ChefMate"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_MINUTES: "60"
  REMEMBER_REFRESH_MINUTES: "10080"
  SECURE_COOKIES: "false"
  COOKIE_SAMESITE: "lax"
  FRONTEND_ORIGIN: "http://localhost:3000"
  CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"

---
apiVersion: v1
kind: Secret
metadata:
  name: chefmate-secrets
type: Opaque
stringData:
  # Copia este archivo como config.yaml y reemplaza los valores con los reales.
  # NUNCA subas config.yaml a Git.
  MONGO_URI: "mongodb+srv://USUARIO:PASSWORD@cluster.mongodb.net/chefmate"
  GOOGLE_API_KEY: "TU_GOOGLE_API_KEY"
  SECRET_KEY: "TU_CLAVE_SECRETA"
  CAPTCHA_SECRET_KEY: "TU_CAPTCHA_SECRET_KEY"
